<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WitChat</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a;
        }

        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            z-index: 1000;
            transition: opacity 0.5s ease;
            background-color: #0f172a;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #334155;
            border-top: 5px solid #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none; /* Hidden until loaded */
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p>Loading WitChat...</p>
    </div>

    <iframe 
        id="chat-frame" 
        src="https://witchat.base44.app/" 
        onload="document.getElementById('loading-screen').style.opacity = '0'; setTimeout(() => { this.style.display = 'block'; document.getElementById('loading-screen').style.display = 'none'; }, 500);">
    </iframe>

</body>
</html>
