<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to WitChat</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0f172a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
        }

        .container {
            text-align: center;
            padding: 2rem;
            background: #1e293b;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1 { margin-bottom: 1rem; color: #38bdf8; }
        p { margin-bottom: 2rem; opacity: 0.8; }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            transition: background 0.3s;
        }

        .btn:hover { background-color: #bae6fd; }
    </style>
</head>
<body>

    <div class="container">
        <h1>WitChat</h1>
        <p>Click the button below to open the chat application.</p>
        <a href="https://witchat.base44.app/" class="btn" target="_blank" rel="noopener noreferrer">Launch WitChat</a>
    </div>

</body>
</html>
